previews:
  generation: manual

services:
  - type: web
    name: ai-hospital-assistant-api-dev
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /api/v1/health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://ai-hospital-assistant-web-dev.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ai-hospital-assistant-postgres-dev
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-hospital-assistant-redis-dev
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: S3_BUCKET
        value: hospital-364807861296-ap-south-1-an
      - key: S3_REGION
        value: ap-south-1
      - key: ELASTICSEARCH_URL
        value: https://example.invalid
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-5

  - type: web
    name: ai-hospital-assistant-web-dev
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: PORT
        value: 10000

  - type: keyvalue
    name: ai-hospital-assistant-redis-dev
    plan: starter
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

databases:
  - name: ai-hospital-assistant-postgres-dev
    databaseName: ai_hospital_assistant
    user: hospital_app
    plan: basic-256mb
    region: singapore
    ipAllowList: []
