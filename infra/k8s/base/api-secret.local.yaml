apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: ai-hospital-assistant
type: Opaque
stringData:
  DATABASE_URL: "postgresql://localhost:5432/ai_hospital_assistant"
  REDIS_URL: "redis://localhost:6379"
  JWT_ACCESS_SECRET: "local-dev-access-secret"
  JWT_REFRESH_SECRET: "local-dev-refresh-secret"
  S3_BUCKET: "local-bucket"
  S3_REGION: "ap-south-1"
  ELASTICSEARCH_URL: "https://example.invalid"
