name: Release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t ai-hospital-assistant/api:${{ inputs.image_tag }} .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t ai-hospital-assistant/web:${{ inputs.image_tag }} .
